<!--
  Quote Request Form for 404fixed.co.uk

  SETUP:
  1. In Netlify dashboard → Site settings → Environment variables, add:
     SUPABASE_URL = your Supabase project URL
     SUPABASE_SERVICE_KEY = your Supabase service role key (Settings > API)

  2. In package.json (or netlify.toml) ensure @supabase/supabase-js is available:
     Create a netlify/functions/package.json:
     { "dependencies": { "@supabase/supabase-js": "^2" } }

  3. Paste this form HTML into your 404fixed.co.uk page.
     Replace YOUR_NETLIFY_SITE with your actual Netlify site subdomain.
-->

<form id="quoteForm" onsubmit="submitQuote(event)">
  <div class="form-row">
    <div>
      <label for="first_name">First Name *</label>
      <input type="text" id="first_name" name="first_name" required>
    </div>
    <div>
      <label for="last_name">Last Name *</label>
      <input type="text" id="last_name" name="last_name" required>
    </div>
  </div>

  <div>
    <label for="email">Email Address *</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div>
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone">
  </div>

  <div>
    <label for="device_type">Device Type *</label>
    <select id="device_type" name="device_type" required>
      <option value="">Select device type...</option>
      <option value="iPhone">iPhone</option>
      <option value="iPad">iPad</option>
      <option value="Samsung">Samsung</option>
      <option value="Android Phone">Android Phone</option>
      <option value="Android Tablet">Android Tablet</option>
      <option value="MacBook">MacBook</option>
      <option value="Windows Laptop">Windows Laptop</option>
      <option value="Desktop PC">Desktop PC</option>
      <option value="Games Console">Games Console</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div>
    <label for="device_make_model">Device Make &amp; Model</label>
    <input type="text" id="device_make_model" name="device_make_model" placeholder="e.g. iPhone 14 Pro, Samsung Galaxy S23">
  </div>

  <div>
    <label for="problem_description">Describe the Problem *</label>
    <textarea id="problem_description" name="problem_description" rows="4" required
      placeholder="Please describe what's wrong with your device..."></textarea>
  </div>

  <div class="consent-row">
    <input type="checkbox" id="marketing_consent" name="marketing_consent">
    <label for="marketing_consent">
      I agree to receive updates and follow-up communications about my repair.
    </label>
  </div>

  <div id="formError" style="display:none;color:red;margin-bottom:12px;"></div>
  <div id="formSuccess" style="display:none;color:green;margin-bottom:12px;">
    Thanks! We've received your quote request and will be in touch shortly.
  </div>

  <button type="submit" id="submitBtn">Get a Free Quote</button>
</form>

<script>
async function submitQuote(e) {
  e.preventDefault()
  const btn = document.getElementById('submitBtn')
  const errorEl = document.getElementById('formError')
  const successEl = document.getElementById('formSuccess')
  errorEl.style.display = 'none'
  successEl.style.display = 'none'
  btn.disabled = true
  btn.textContent = 'Sending...'

  const form = e.target
  const data = {
    first_name: form.first_name.value.trim(),
    last_name: form.last_name.value.trim(),
    email: form.email.value.trim(),
    phone: form.phone.value.trim() || null,
    device_type: form.device_type.value || null,
    device_make_model: form.device_make_model.value.trim() || null,
    problem_description: form.problem_description.value.trim(),
    marketing_consent: form.marketing_consent.checked,
  }

  try {
    const res = await fetch('https://app.404fixed.co.uk/api/quotes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })
    const json = await res.json()
    if (!res.ok) throw new Error(json.error || 'Something went wrong')
    form.reset()
    successEl.style.display = 'block'
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.style.display = 'block'
  } finally {
    btn.disabled = false
    btn.textContent = 'Get a Free Quote'
  }
}
</script>
